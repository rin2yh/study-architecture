# 社外公開 (顧客向け) UI。store / mypage は external ネットワークのみに attach し、
# backend へは edge-proxy 経由でアクセスする ([[ADR 0012]] reverse proxy パターン)。
# 共通の network / DB / backend は compose.yaml 側。

services:
  store:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: store
    environment:
      PORT: "5173"
      HOST: "0.0.0.0"
      NODE_ENV: production
      PRODUCT_API_URL: http://edge-proxy/product
      ORDER_API_URL: http://edge-proxy/order
      PAYMENT_API_URL: http://edge-proxy/payment
    ports: ["5173:5173"]
    depends_on:
      edge-proxy:
        condition: service_healthy
    networks: [external]

  mypage:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: mypage
    environment:
      PORT: "5174"
      HOST: "0.0.0.0"
      NODE_ENV: production
      MEMBER_API_URL: http://edge-proxy/member
      ORDER_API_URL: http://edge-proxy/order
      SHIPPING_API_URL: http://edge-proxy/shipping
    ports: ["5174:5174"]
    depends_on:
      edge-proxy:
        condition: service_healthy
    networks: [external]
