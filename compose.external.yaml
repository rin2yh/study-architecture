# 社外公開 (顧客向け) UI。store / mypage は external ネットワークだけに attach する。
# 共通の network / DB / backend は compose.yaml 側に定義。

services:
  store:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: store
    environment:
      PORT: "5173"
      HOST: "0.0.0.0"
      NODE_ENV: production
      PRODUCT_API_URL: http://product:8080
      ORDER_API_URL: http://order:8080
      PAYMENT_API_URL: http://payment:8080
    ports: ["5173:5173"]
    depends_on: [product, order, payment]
    networks: [external]

  mypage:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: mypage
    environment:
      PORT: "5174"
      HOST: "0.0.0.0"
      NODE_ENV: production
      MEMBER_API_URL: http://member:8080
      ORDER_API_URL: http://order:8080
      SHIPPING_API_URL: http://shipping:8080
    ports: ["5174:5174"]
    depends_on: [member, order, shipping]
    networks: [external]
