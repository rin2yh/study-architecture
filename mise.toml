[tasks.up]
description = "全サービスを起動 (社外 + 社内)"
run = "docker compose --profile external --profile internal up -d --build"

[tasks."up:external"]
description = "社外側スタックだけ起動 (store / mypage)"
run = "docker compose --profile external up -d --build"

[tasks."up:internal"]
description = "社内側スタックだけ起動 (backoffice)"
run = "docker compose --profile internal up -d --build"

[tasks.down]
description = "全サービスを停止"
run = "docker compose --profile external --profile internal --profile tools down"

[tasks.logs]
description = "ログ追従"
run = "docker compose logs -f"
