[tools]
# migrate.sh は prebuilt goose を使う (go tool goose は全 DB ドライバを毎回ビルドして遅い)。
goose = "3.27.1"

[tasks.build]
description = "全 image を 1 つずつ build (並列 build で daemon が詰まるのを避ける)"
run = """
for svc in product order payment member shipping shipping-worker; do
  docker compose build "$svc"
done
docker compose --profile external build store
docker compose --profile internal build backoffice
"""

[tasks.up]
description = "全サービスを起動 (build 済み image を使う)"
depends = ["build"]
run = "docker compose --profile external --profile internal up -d --no-build"

[tasks."up:external"]
description = "社外側スタックだけ起動"
depends = ["build"]
run = "docker compose --profile external up -d --no-build"

[tasks."up:internal"]
description = "社内側スタックだけ起動"
depends = ["build"]
run = "docker compose --profile internal up -d --no-build"

[tasks."up:db"]
description = "DB だけ起動 (CI / 結合テスト用)"
run = "docker compose up -d --wait db-customer db-payment db-member db-shipping db-ops"

[tasks.migrate]
description = "5 サービス分の migration を流す (引数で 1 サービス指定可)"
run = "./scripts/migrate.sh"

# サービスを実ロールで起動する前に必要 (ADR-[[202606231000]])。
[tasks.grant]
description = "サービスごとの最小権限 DB ロールを作成・付与する"
depends = ["up:db", "migrate"]
run = "./scripts/grant.sh"

# repository の実 DB 結合テストは DATABASE_URL_{CUSTOMER,OPS} が無いと skip される。
# このタスクは DB 起動 → migrate → DSN を渡して全テストを実行する (CI server-integration 相当)。
[tasks."test:integration"]
description = "DB を立てて結合テストまで含めて実行"
depends = ["up:db", "migrate"]
env = { DATABASE_URL_CUSTOMER = "postgres://ec:ec_pass@localhost:5432/ec_customer?sslmode=disable", DATABASE_URL_PAYMENT = "postgres://ec:ec_pass@localhost:5434/ec_payment?sslmode=disable", DATABASE_URL_MEMBER = "postgres://ec:ec_pass@localhost:5436/ec_member?sslmode=disable", DATABASE_URL_SHIPPING = "postgres://ec:ec_pass@localhost:5435/ec_shipping?sslmode=disable", DATABASE_URL_OPS = "postgres://ec:ec_pass@localhost:5433/ec_ops?sslmode=disable" }
run = "go test ./server/... -race -count=1"

# E2E は scripts/e2e-up.sh でスタックを起動してから Playwright を回す。install は 3 タスクで共有する。
[tasks."test:e2e:install"]
description = "E2E 用に client 依存と Playwright ブラウザを入れる"
run = """
pnpm -C client install --frozen-lockfile
pnpm -C client -F e2e exec playwright install --with-deps chromium
"""

[tasks."test:e2e:store"]
description = "store の E2E を実行 (社外スタックを起動)"
depends = ["test:e2e:install"]
run = """
./scripts/e2e-up.sh store
pnpm -C client -F e2e test --project=store
"""

[tasks."test:e2e:backoffice"]
description = "backoffice の E2E を実行 (社内スタックを起動)"
depends = ["test:e2e:install"]
run = """
./scripts/e2e-up.sh backoffice
pnpm -C client -F e2e test --project=backoffice
"""

# store / backoffice はスタックが別なので 1 つずつ順に起動して実行する。
[tasks."test:e2e"]
description = "store / backoffice の E2E を順に実行"
depends = ["test:e2e:install"]
run = """
./scripts/e2e-up.sh store
pnpm -C client -F e2e test --project=store
./scripts/e2e-up.sh backoffice
pnpm -C client -F e2e test --project=backoffice
"""

[tasks.down]
description = "全サービスを停止"
run = "docker compose --profile external --profile internal down"

[tasks.logs]
description = "ログ追従"
run = "docker compose logs -f"
