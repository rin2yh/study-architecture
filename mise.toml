# mise.toml (リポジトリルート) — 横断的な docker compose タスクのみ。
# Go / Node のバージョンとそれぞれの tasks は server/mise.toml と client/mise.toml に分割。

[tasks.up]
description = "全サービスを起動 (docker compose up -d --build)"
run = "docker compose up -d --build"

[tasks.down]
description = "全サービスを停止"
run = "docker compose down"

[tasks.logs]
description = "ログ追従"
run = "docker compose logs -f"
