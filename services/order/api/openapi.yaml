openapi: 3.0.3
info:
  title: Order Service API
  version: 0.1.0
  description: 注文ドメイン。Step 0 の薄い骨格（liveness + 一覧）。
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      tags: [system]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /orders:
    get:
      operationId: listOrders
      summary: 注文一覧
      tags: [order]
      responses:
        "200":
          description: 注文の配列
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
components:
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    Order:
      type: object
      required: [id, memberId, status, totalCents, createdAt]
      properties:
        id:
          type: integer
          format: int64
        memberId:
          type: integer
          format: int64
        status:
          type: string
        totalCents:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
