name: ec-service-based

# 「複数の network に attach するもの」だけがこのファイル。
# - networks 定義 (external / internal)
# - edge-proxy (両方の network に attach する唯一の container、社外→社内アクセスの唯一の経路)
#
# 社外専用 UI は compose.external.yaml、社内専用リソース (DB / backend / migrate / backoffice) は
# compose.internal.yaml に置く ([[ADR 0012]])。
#
# 全部立てる:
#   docker compose -f compose.yaml -f compose.external.yaml -f compose.internal.yaml up -d --build

networks:
  external: {}
  internal: {}

services:
  edge-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/edge-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [external, internal]
    depends_on: [product, order, payment, member, shipping]
