name: ec-service-based

# Step 0 のコア (ネットワーク / 顧客 DB / backend サービス)。
# 社外専用 UI は compose.external.yaml、社内専用リソース (db-ops / backoffice) は compose.internal.yaml。
#
# 全部立てる:
#   docker compose -f compose.yaml -f compose.external.yaml -f compose.internal.yaml up -d --build
#
# マイグレーションは ([[ADR 0013]]) CI/CD でデプロイ前に流す方針。ローカルから手動で適用したい
# ときは `mise run migrate:<svc>` か、以下の compose ジョブを使う:
#   docker compose --profile tools run --rm migrate-order
#   docker compose --profile tools run --rm migrate-payment
#   docker compose --profile tools run --rm migrate-member
# (db-ops 向け migrate-product / migrate-shipping は compose.internal.yaml 側にある)

networks:
  external: {}
  internal: {}

volumes:
  pg_customer_data:

services:
  db-customer:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ec
      POSTGRES_PASSWORD: ec_pass
      POSTGRES_DB: ec_customer
    ports:
      - "5432:5432"
    volumes:
      - pg_customer_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_customer"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [external, internal]

  # 顧客系 (db-customer) 向け migration ([[ADR 0013]])。image は ec-migrate を共有して build 1 回。
  migrate-order:
    image: ec-migrate
    build:
      context: .
      dockerfile: Dockerfile.migrate
    profiles: ["tools"]
    depends_on:
      db-customer:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
    command: ["-dir", "/migrations/order", "up"]
    networks: [external, internal]

  migrate-payment:
    image: ec-migrate
    build:
      context: .
      dockerfile: Dockerfile.migrate
    profiles: ["tools"]
    depends_on:
      db-customer:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
    command: ["-dir", "/migrations/payment", "up"]
    networks: [external, internal]

  migrate-member:
    image: ec-migrate
    build:
      context: .
      dockerfile: Dockerfile.migrate
    profiles: ["tools"]
    depends_on:
      db-customer:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
    command: ["-dir", "/migrations/member", "up"]
    networks: [external, internal]

  product:
    build:
      context: .
      dockerfile: server/product/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-ops:5432/ec_ops?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8001:8080"]
    depends_on:
      db-ops:
        condition: service_healthy
    networks: [external, internal]

  order:
    build:
      context: .
      dockerfile: server/order/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8002:8080"]
    depends_on:
      db-customer:
        condition: service_healthy
    networks: [external, internal]

  payment:
    build:
      context: .
      dockerfile: server/payment/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8003:8080"]
    depends_on:
      db-customer:
        condition: service_healthy
    networks: [external, internal]

  member:
    build:
      context: .
      dockerfile: server/member/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8004:8080"]
    depends_on:
      db-customer:
        condition: service_healthy
    networks: [external, internal]

  shipping:
    build:
      context: .
      dockerfile: server/shipping/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-ops:5432/ec_ops?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8005:8080"]
    depends_on:
      db-ops:
        condition: service_healthy
    networks: [external, internal]
