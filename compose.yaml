name: ec-service-based

# Step 0: 分割UI（後続） / 直接呼び出し / 共有DB（schema 分離）
# 起動順: `mise gen`(コード生成) → `mise up` → `docker compose run --rm migrate up`（または `mise migrate`）

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ec
      POSTGRES_PASSWORD: ec_pass
      POSTGRES_DB: ec
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ec -d ec"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ワンショットのマイグレーション実行（goose）。
  #   docker compose run --rm migrate up      # 最新まで適用
  #   docker compose run --rm migrate status  # 状況確認
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://ec:ec_pass@db:5432/ec?sslmode=disable
    command: ["up"]

  product:
    build:
      context: .
      dockerfile: server/product/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db:5432/ec?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8001:8080"]
    depends_on:
      db:
        condition: service_healthy

  order:
    build:
      context: .
      dockerfile: server/order/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db:5432/ec?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8002:8080"]
    depends_on:
      db:
        condition: service_healthy

  payment:
    build:
      context: .
      dockerfile: server/payment/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db:5432/ec?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8003:8080"]
    depends_on:
      db:
        condition: service_healthy

  member:
    build:
      context: .
      dockerfile: server/member/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db:5432/ec?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8004:8080"]
    depends_on:
      db:
        condition: service_healthy

  shipping:
    build:
      context: .
      dockerfile: server/shipping/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db:5432/ec?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8005:8080"]
    depends_on:
      db:
        condition: service_healthy

  # UI: TanStack Start (Node)。サーバ側ローダ/サーバ関数から同一ネットワークの
  # Go サービスを http://<svc>:8080 で呼ぶ。ブラウザは UI:port のみ叩くため CORS 不要（ADR 0006）。
  store:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: store
    environment:
      # start-server.mjs が listen する。compose 直接公開ポート (5173/5174/5175) と
      # 一致させておくと curl http://localhost:<port> でそのまま叩ける。
      PORT: "5173"
      HOST: "0.0.0.0"
      NODE_ENV: production
      PRODUCT_API_URL: http://product:8080
      ORDER_API_URL: http://order:8080
      PAYMENT_API_URL: http://payment:8080
    ports: ["5173:5173"]
    depends_on: [product, order, payment]

  mypage:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: mypage
    environment:
      PORT: "5174"
      HOST: "0.0.0.0"
      NODE_ENV: production
      MEMBER_API_URL: http://member:8080
      ORDER_API_URL: http://order:8080
      SHIPPING_API_URL: http://shipping:8080
    ports: ["5174:5174"]
    depends_on: [member, order, shipping]

  backoffice:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: backoffice
    environment:
      PORT: "5175"
      HOST: "0.0.0.0"
      NODE_ENV: production
      PRODUCT_API_URL: http://product:8080
      ORDER_API_URL: http://order:8080
      SHIPPING_API_URL: http://shipping:8080
    ports: ["5175:5175"]
    depends_on: [product, order, shipping]

volumes:
  pg_data:
