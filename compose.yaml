name: ec-service-based

# Step 0: 分割UI（後続） / 直接呼び出し / 共有DB（schema 分離）
# 起動順: `mise gen`(コード生成) → `mise up` → `docker compose run --rm migrate up`（または `mise migrate`）

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ec
      POSTGRES_PASSWORD: ec_pass
      POSTGRES_DB: ec
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ec -d ec"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ワンショットのマイグレーション実行（goose）。
  #   docker compose run --rm migrate up      # 最新まで適用
  #   docker compose run --rm migrate status  # 状況確認
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://ec:ec_pass@db:5432/ec?sslmode=disable
    command: ["up"]

  product:
    build:
      context: .
      dockerfile: services/product/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db:5432/ec?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8001:8080"]
    depends_on:
      db:
        condition: service_healthy

  order:
    build:
      context: .
      dockerfile: services/order/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db:5432/ec?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8002:8080"]
    depends_on:
      db:
        condition: service_healthy

  payment:
    build:
      context: .
      dockerfile: services/payment/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db:5432/ec?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8003:8080"]
    depends_on:
      db:
        condition: service_healthy

  member:
    build:
      context: .
      dockerfile: services/member/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db:5432/ec?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8004:8080"]
    depends_on:
      db:
        condition: service_healthy

  shipping:
    build:
      context: .
      dockerfile: services/shipping/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db:5432/ec?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8005:8080"]
    depends_on:
      db:
        condition: service_healthy

  # UI（storefront / mypage / admin）は後続イテレーションで追加（TanStack Start）。
  # ADR 0005 参照。ブラウザ直接呼び出し → 将来 BFF/ファサードへ。

volumes:
  pg_data:
