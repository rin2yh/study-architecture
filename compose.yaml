name: ec-service-based

networks:
  external-public: {}
  external-private: {}
  internal-public: {}
  internal-private: {}

volumes:
  pg_customer_data:
  pg_ops_data:

services:
  edge-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/edge-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [external-public, external-private, internal-private]
    depends_on: [product, order, payment, member, shipping]

  db-customer:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ec
      POSTGRES_PASSWORD: ec_pass
      POSTGRES_DB: ec_customer
    ports:
      - "5432:5432"
    volumes:
      - pg_customer_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_customer"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [external-private]

  db-ops:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ec
      POSTGRES_PASSWORD: ec_pass
      POSTGRES_DB: ec_ops
    ports:
      - "5433:5432"
    volumes:
      - pg_ops_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_ops"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal-private]

  product:
    build:
      context: .
      dockerfile: server/product/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-ops:5432/ec_ops?sslmode=disable
    ports: ["8001:80"]
    depends_on:
      db-ops:
        condition: service_healthy
    networks: [internal-private]

  order:
    build:
      context: .
      dockerfile: server/order/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
      # checkout の連携先 URL。経路は ADR 0008 / 0012 を参照。
      PAYMENT_API_URL: http://payment
      PRODUCT_API_URL: http://edge-proxy/product
    ports: ["8002:80"]
    depends_on:
      db-customer:
        condition: service_healthy
    networks: [external-private]

  payment:
    build:
      context: .
      dockerfile: server/payment/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
    ports: ["8003:80"]
    depends_on:
      db-customer:
        condition: service_healthy
    networks: [external-private]

  member:
    build:
      context: .
      dockerfile: server/member/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
    ports: ["8004:80"]
    depends_on:
      db-customer:
        condition: service_healthy
    networks: [external-private]

  shipping:
    build:
      context: .
      dockerfile: server/shipping/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-ops:5432/ec_ops?sslmode=disable
    ports: ["8005:80"]
    depends_on:
      db-ops:
        condition: service_healthy
    networks: [internal-private]

  store:
    profiles: ["external"]
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: store
    environment:
      PORT: "5173"
      HOST: "0.0.0.0"
      NODE_ENV: production
      PRODUCT_API_URL: http://edge-proxy/product
      ORDER_API_URL: http://edge-proxy/order
      PAYMENT_API_URL: http://edge-proxy/payment
      MEMBER_API_URL: http://edge-proxy/member
    ports: ["5173:5173"]
    depends_on:
      edge-proxy:
        condition: service_healthy
    networks: [external-public]

  mypage:
    profiles: ["external"]
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: mypage
    environment:
      PORT: "5174"
      HOST: "0.0.0.0"
      NODE_ENV: production
      MEMBER_API_URL: http://edge-proxy/member
      ORDER_API_URL: http://edge-proxy/order
      SHIPPING_API_URL: http://edge-proxy/shipping
    ports: ["5174:5174"]
    depends_on:
      edge-proxy:
        condition: service_healthy
    networks: [external-public]

  # 社内 admin gateway: 社内 LAN (internal-public) に公開され、自身は社内 DB
  # (internal-private) と顧客系 backend (external-private) に手を伸ばす 3 attach の
  # マルチホーム container。これが「社内 → 社外 OK」経路の表現。
  backoffice:
    profiles: ["internal"]
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: backoffice
    environment:
      PORT: "5175"
      HOST: "0.0.0.0"
      NODE_ENV: production
      PRODUCT_API_URL: http://product
      ORDER_API_URL: http://order
      SHIPPING_API_URL: http://shipping
    ports: ["5175:5175"]
    depends_on: [product, order, shipping]
    networks: [internal-public, internal-private, external-private]
