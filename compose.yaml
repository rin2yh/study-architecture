name: ec-service-based

# Step 0 のコア (ネットワーク / DB / backend サービス)。UI は社外 / 社内で分けて
# compose.external.yaml / compose.internal.yaml に置く。
#
# 全部立てる:
#   docker compose -f compose.yaml -f compose.external.yaml -f compose.internal.yaml up -d --build
# migrate (サービスごと):
#   docker compose --profile tools run --rm migrate-order
#   docker compose --profile tools run --rm migrate-payment
#   docker compose --profile tools run --rm migrate-member
#   docker compose --profile tools run --rm migrate-product
#   docker compose --profile tools run --rm migrate-shipping

networks:
  external: {}
  internal: {}

volumes:
  pg_customer_data:
  pg_ops_data:

services:
  db-customer:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ec
      POSTGRES_PASSWORD: ec_pass
      POSTGRES_DB: ec_customer
    ports:
      - "5432:5432"
    volumes:
      - pg_customer_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_customer"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [external, internal]

  db-ops:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ec
      POSTGRES_PASSWORD: ec_pass
      POSTGRES_DB: ec_ops
    ports:
      - "5433:5432"
    volumes:
      - pg_ops_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_ops"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  # migration はサービスごとに独立 ([[ADR 0013]])。
  # 顧客系 (db-customer) 向け: order / payment / member
  # 運用系 (db-ops) 向け:      product / shipping
  # 個別実行例:
  #   docker compose --profile tools run --rm migrate-order up
  migrate-order:
    image: ec-migrate
    build:
      context: .
      dockerfile: Dockerfile.migrate
    profiles: ["tools"]
    depends_on:
      db-customer:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
    command: ["-dir", "/migrations/order", "up"]
    networks: [external, internal]

  migrate-payment:
    image: ec-migrate
    build:
      context: .
      dockerfile: Dockerfile.migrate
    profiles: ["tools"]
    depends_on:
      db-customer:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
    command: ["-dir", "/migrations/payment", "up"]
    networks: [external, internal]

  migrate-member:
    image: ec-migrate
    build:
      context: .
      dockerfile: Dockerfile.migrate
    profiles: ["tools"]
    depends_on:
      db-customer:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
    command: ["-dir", "/migrations/member", "up"]
    networks: [external, internal]

  migrate-product:
    image: ec-migrate
    build:
      context: .
      dockerfile: Dockerfile.migrate
    profiles: ["tools"]
    depends_on:
      db-ops:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://ec:ec_pass@db-ops:5432/ec_ops?sslmode=disable
    command: ["-dir", "/migrations/product", "up"]
    networks: [internal]

  migrate-shipping:
    image: ec-migrate
    build:
      context: .
      dockerfile: Dockerfile.migrate
    profiles: ["tools"]
    depends_on:
      db-ops:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://ec:ec_pass@db-ops:5432/ec_ops?sslmode=disable
    command: ["-dir", "/migrations/shipping", "up"]
    networks: [internal]

  product:
    build:
      context: .
      dockerfile: server/product/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-ops:5432/ec_ops?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8001:8080"]
    depends_on:
      db-ops:
        condition: service_healthy
    networks: [external, internal]

  order:
    build:
      context: .
      dockerfile: server/order/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8002:8080"]
    depends_on:
      db-customer:
        condition: service_healthy
    networks: [external, internal]

  payment:
    build:
      context: .
      dockerfile: server/payment/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8003:8080"]
    depends_on:
      db-customer:
        condition: service_healthy
    networks: [external, internal]

  member:
    build:
      context: .
      dockerfile: server/member/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8004:8080"]
    depends_on:
      db-customer:
        condition: service_healthy
    networks: [external, internal]

  shipping:
    build:
      context: .
      dockerfile: server/shipping/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-ops:5432/ec_ops?sslmode=disable
      HTTP_ADDR: ":8080"
    ports: ["8005:8080"]
    depends_on:
      db-ops:
        condition: service_healthy
    networks: [external, internal]
