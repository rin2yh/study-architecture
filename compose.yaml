name: ec-service-based

# 全部立てる:           docker compose --profile external --profile internal up -d --build
# 社外側スタックだけ:   docker compose --profile external             up -d --build
# 社内側スタックだけ:   docker compose --profile internal             up -d --build
# migrate を流す:       docker compose --profile tools run --rm migrate-<svc>

networks:
  external: {}
  internal: {}

volumes:
  pg_customer_data:
  pg_ops_data:

x-migrate-customer: &migrate-customer
  image: ec-migrate
  build:
    context: .
    dockerfile: Dockerfile.migrate
  profiles: ["tools"]
  depends_on:
    db-customer:
      condition: service_healthy
  environment:
    GOOSE_DRIVER: postgres
    GOOSE_DBSTRING: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
  networks: [internal]

x-migrate-ops: &migrate-ops
  image: ec-migrate
  build:
    context: .
    dockerfile: Dockerfile.migrate
  profiles: ["tools"]
  depends_on:
    db-ops:
      condition: service_healthy
  environment:
    GOOSE_DRIVER: postgres
    GOOSE_DBSTRING: postgres://ec:ec_pass@db-ops:5432/ec_ops?sslmode=disable
  networks: [internal]

services:
  edge-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/edge-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [external, internal]
    depends_on: [product, order, payment, member, shipping]

  db-customer:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ec
      POSTGRES_PASSWORD: ec_pass
      POSTGRES_DB: ec_customer
    ports:
      - "5432:5432"
    volumes:
      - pg_customer_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_customer"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  db-ops:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ec
      POSTGRES_PASSWORD: ec_pass
      POSTGRES_DB: ec_ops
    ports:
      - "5433:5432"
    volumes:
      - pg_ops_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_ops"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  migrate-order:
    <<: *migrate-customer
    command: ["-table", "goose_order_version", "-dir", "/migrations/order", "up"]

  migrate-payment:
    <<: *migrate-customer
    command: ["-table", "goose_payment_version", "-dir", "/migrations/payment", "up"]

  migrate-member:
    <<: *migrate-customer
    command: ["-table", "goose_member_version", "-dir", "/migrations/member", "up"]

  migrate-product:
    <<: *migrate-ops
    command: ["-table", "goose_product_version", "-dir", "/migrations/product", "up"]

  migrate-shipping:
    <<: *migrate-ops
    command: ["-table", "goose_shipping_version", "-dir", "/migrations/shipping", "up"]

  product:
    build:
      context: .
      dockerfile: server/product/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-ops:5432/ec_ops?sslmode=disable
    ports: ["8001:80"]
    depends_on:
      db-ops:
        condition: service_healthy
    networks: [internal]

  order:
    build:
      context: .
      dockerfile: server/order/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
    ports: ["8002:80"]
    depends_on:
      db-customer:
        condition: service_healthy
    networks: [internal]

  payment:
    build:
      context: .
      dockerfile: server/payment/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
    ports: ["8003:80"]
    depends_on:
      db-customer:
        condition: service_healthy
    networks: [internal]

  member:
    build:
      context: .
      dockerfile: server/member/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-customer:5432/ec_customer?sslmode=disable
    ports: ["8004:80"]
    depends_on:
      db-customer:
        condition: service_healthy
    networks: [internal]

  shipping:
    build:
      context: .
      dockerfile: server/shipping/Dockerfile
    environment:
      DATABASE_URL: postgres://ec:ec_pass@db-ops:5432/ec_ops?sslmode=disable
    ports: ["8005:80"]
    depends_on:
      db-ops:
        condition: service_healthy
    networks: [internal]

  store:
    profiles: ["external"]
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: store
    environment:
      PORT: "5173"
      HOST: "0.0.0.0"
      NODE_ENV: production
      PRODUCT_API_URL: http://edge-proxy/product
      ORDER_API_URL: http://edge-proxy/order
      PAYMENT_API_URL: http://edge-proxy/payment
    ports: ["5173:5173"]
    depends_on:
      edge-proxy:
        condition: service_healthy
    networks: [external]

  mypage:
    profiles: ["external"]
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: mypage
    environment:
      PORT: "5174"
      HOST: "0.0.0.0"
      NODE_ENV: production
      MEMBER_API_URL: http://edge-proxy/member
      ORDER_API_URL: http://edge-proxy/order
      SHIPPING_API_URL: http://edge-proxy/shipping
    ports: ["5174:5174"]
    depends_on:
      edge-proxy:
        condition: service_healthy
    networks: [external]

  backoffice:
    profiles: ["internal"]
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: backoffice
    environment:
      PORT: "5175"
      HOST: "0.0.0.0"
      NODE_ENV: production
      PRODUCT_API_URL: http://product
      ORDER_API_URL: http://order
      SHIPPING_API_URL: http://shipping
    ports: ["5175:5175"]
    depends_on: [product, order, shipping]
    networks: [internal]
