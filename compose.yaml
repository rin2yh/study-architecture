name: ec-service-based

networks:
  external-public: {}
  external-private: {}
  internal-public: {}
  internal-private: {}
  observability: {}

volumes:
  pg_order_data:
  pg_payment_data:
  pg_member_data:
  pg_product_data:
  pg_shipping_data:

# 送り先は Alloy 固定 (ADR-[[202606241356]])。Alloy 不在 (observability profile 未起動) でも
# アプリは graceful degradation で起動する。
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317

x-postgres: &postgres
  image: postgres:17-alpine
  environment: &postgres-env
    POSTGRES_USER: ec
    POSTGRES_PASSWORD: ec_pass
  healthcheck: &postgres-healthcheck
    interval: 5s
    timeout: 3s
    retries: 10

services:
  edge-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/edge-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [external-public, external-private, internal-private]
    depends_on: [product, order, payment, member, shipping]

  broker:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [external-private, internal-private]

  db-order:
    <<: *postgres
    environment:
      <<: *postgres-env
      POSTGRES_DB: ec_order
    ports:
      - "5432:5432"
    volumes:
      - pg_order_data:/var/lib/postgresql/data
    healthcheck:
      <<: *postgres-healthcheck
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_order"]
    networks: [external-private]

  db-payment:
    <<: *postgres
    environment:
      <<: *postgres-env
      POSTGRES_DB: ec_payment
    ports:
      - "5434:5432"
    volumes:
      - pg_payment_data:/var/lib/postgresql/data
    healthcheck:
      <<: *postgres-healthcheck
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_payment"]
    networks: [external-private]

  db-member:
    <<: *postgres
    environment:
      <<: *postgres-env
      POSTGRES_DB: ec_member
    ports:
      - "5436:5432"
    volumes:
      - pg_member_data:/var/lib/postgresql/data
    healthcheck:
      <<: *postgres-healthcheck
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_member"]
    networks: [external-private]

  db-product:
    <<: *postgres
    environment:
      <<: *postgres-env
      POSTGRES_DB: ec_product
    ports:
      - "5433:5432"
    volumes:
      - pg_product_data:/var/lib/postgresql/data
    healthcheck:
      <<: *postgres-healthcheck
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_product"]
    networks: [internal-private]

  db-shipping:
    <<: *postgres
    environment:
      <<: *postgres-env
      POSTGRES_DB: ec_shipping
    ports:
      - "5435:5432"
    volumes:
      - pg_shipping_data:/var/lib/postgresql/data
    healthcheck:
      <<: *postgres-healthcheck
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_shipping"]
    networks: [internal-private]

  product:
    build:
      context: .
      dockerfile: server/product/Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: product
      # 自 schema にしか触れない最小権限ロールで接続する (ADR-[[202606231000]])。
      DATABASE_URL: postgres://product_svc:product_pass@db-product:5432/ec_product?sslmode=disable
    ports: ["8001:80"]
    depends_on:
      db-product:
        condition: service_healthy
    networks: [internal-private]

  order:
    build:
      context: .
      dockerfile: server/order/Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: order
      DATABASE_URL: postgres://order_svc:order_pass@db-order:5432/ec_order?sslmode=disable # ADR-[[202606231000]]
      # (ADR 0008 / 0012)
      PAYMENT_API_URL: http://payment
      PRODUCT_API_URL: http://edge-proxy/product
    ports: ["8002:80"]
    depends_on:
      db-order:
        condition: service_healthy
    networks: [external-private]

  payment:
    build:
      context: .
      dockerfile: server/payment/Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: payment
      DATABASE_URL: postgres://payment_svc:payment_pass@db-payment:5432/ec_payment?sslmode=disable # ADR-[[202606231000]]
      REDIS_URL: redis://broker:6379 # ADR-[[202606211200]]
    ports: ["8003:80"]
    depends_on:
      db-payment:
        condition: service_healthy
      broker:
        condition: service_healthy
    networks: [external-private]

  member:
    build:
      context: .
      dockerfile: server/member/Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: member
      DATABASE_URL: postgres://member_svc:member_pass@db-member:5432/ec_member?sslmode=disable # ADR-[[202606231000]]
    ports: ["8004:80"]
    depends_on:
      db-member:
        condition: service_healthy
    networks: [external-private]

  shipping:
    build:
      context: .
      dockerfile: server/shipping/docker/server.Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: shipping
      DATABASE_URL: postgres://shipping_svc:shipping_pass@db-shipping:5432/ec_shipping?sslmode=disable # ADR-[[202606231000]]
    ports: ["8005:80"]
    depends_on:
      db-shipping:
        condition: service_healthy
    networks: [internal-private]

  # ADR-[[202606211200]]
  shipping-worker:
    build:
      context: .
      dockerfile: server/shipping/docker/worker.Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: shipping-worker
      DATABASE_URL: postgres://shipping_svc:shipping_pass@db-shipping:5432/ec_shipping?sslmode=disable # ADR-[[202606231000]]
      REDIS_URL: redis://broker:6379
    depends_on:
      db-shipping:
        condition: service_healthy
      broker:
        condition: service_healthy
    networks: [internal-private]

  store:
    profiles: ["external"]
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: store
    environment:
      PORT: "5173"
      HOST: "0.0.0.0"
      NODE_ENV: production
      PRODUCT_API_URL: http://edge-proxy/product
      ORDER_API_URL: http://edge-proxy/order
      PAYMENT_API_URL: http://edge-proxy/payment
      MEMBER_API_URL: http://edge-proxy/member
    ports: ["5173:5173"]
    depends_on:
      edge-proxy:
        condition: service_healthy
    networks: [external-public]

  # マルチホーム接続で「社内 → 社外 OK」経路を表現する admin gateway。
  backoffice:
    profiles: ["internal"]
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: backoffice
    environment:
      PORT: "5175"
      HOST: "0.0.0.0"
      NODE_ENV: production
      PRODUCT_API_URL: http://product
      ORDER_API_URL: http://order
      SHIPPING_API_URL: http://shipping
    ports: ["5175:5175"]
    depends_on: [product, order, shipping]
    networks: [internal-public, internal-private, external-private]

  # ADR-[[202606241356]]
  alloy:
    profiles: ["observability"]
    image: grafana/alloy:v1.7.5
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./infra/o11y/config.alloy:/etc/alloy/config.alloy:ro
      # stdout の JSON ログを Docker から直接読むため socket を渡す (ADR-[[202606241356]])。
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # 計装対象が external-private と internal-private に分かれており、両方へ到達する必要があるため。
    networks: [external-private, internal-private, observability]
    depends_on: [tempo, loki]

  tempo:
    profiles: ["observability"]
    image: grafana/tempo:2.8.2
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./infra/o11y/tempo.yaml:/etc/tempo/tempo.yaml:ro
    networks: [observability]

  loki:
    profiles: ["observability"]
    image: grafana/loki:3.5.1
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./infra/o11y/loki.yaml:/etc/loki/loki.yaml:ro
    networks: [observability]

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:12.2.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./infra/o11y/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    ports: ["3000:3000"]
    networks: [observability]
    depends_on: [tempo, loki]
