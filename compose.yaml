name: ec-service-based

networks:
  external-public: {}
  external-private: {}
  internal-public: {}
  internal-private: {}

volumes:
  pg_customer_data:
  pg_payment_data:
  pg_ops_data:
  pg_shipping_data:

x-postgres: &postgres
  image: postgres:17-alpine
  environment: &postgres-env
    POSTGRES_USER: ec
    POSTGRES_PASSWORD: ec_pass
  healthcheck: &postgres-healthcheck
    interval: 5s
    timeout: 3s
    retries: 10

services:
  edge-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/edge-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [external-public, external-private, internal-private]
    depends_on: [product, order, payment, member, shipping]

  broker:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [external-private, internal-private]

  db-customer:
    <<: *postgres
    environment:
      <<: *postgres-env
      POSTGRES_DB: ec_customer
    ports:
      - "5432:5432"
    volumes:
      - pg_customer_data:/var/lib/postgresql/data
    healthcheck:
      <<: *postgres-healthcheck
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_customer"]
    networks: [external-private]

  db-payment:
    <<: *postgres
    environment:
      <<: *postgres-env
      POSTGRES_DB: ec_payment
    ports:
      - "5434:5432"
    volumes:
      - pg_payment_data:/var/lib/postgresql/data
    healthcheck:
      <<: *postgres-healthcheck
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_payment"]
    networks: [external-private]

  db-ops:
    <<: *postgres
    environment:
      <<: *postgres-env
      POSTGRES_DB: ec_ops
    ports:
      - "5433:5432"
    volumes:
      - pg_ops_data:/var/lib/postgresql/data
    healthcheck:
      <<: *postgres-healthcheck
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_ops"]
    networks: [internal-private]

  db-shipping:
    <<: *postgres
    environment:
      <<: *postgres-env
      POSTGRES_DB: ec_shipping
    ports:
      - "5435:5432"
    volumes:
      - pg_shipping_data:/var/lib/postgresql/data
    healthcheck:
      <<: *postgres-healthcheck
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_shipping"]
    networks: [internal-private]

  product:
    build:
      context: .
      dockerfile: server/product/Dockerfile
    environment:
      # 自 schema にしか触れない最小権限ロールで接続する (ADR-[[202606231000]])。
      DATABASE_URL: postgres://product_svc:product_pass@db-ops:5432/ec_ops?sslmode=disable
    ports: ["8001:80"]
    depends_on:
      db-ops:
        condition: service_healthy
    networks: [internal-private]

  order:
    build:
      context: .
      dockerfile: server/order/Dockerfile
    environment:
      DATABASE_URL: postgres://order_svc:order_pass@db-customer:5432/ec_customer?sslmode=disable # ADR-[[202606231000]]
      # (ADR 0008 / 0012)
      PAYMENT_API_URL: http://payment
      PRODUCT_API_URL: http://edge-proxy/product
    ports: ["8002:80"]
    depends_on:
      db-customer:
        condition: service_healthy
    networks: [external-private]

  payment:
    build:
      context: .
      dockerfile: server/payment/Dockerfile
    environment:
      DATABASE_URL: postgres://payment_svc:payment_pass@db-payment:5432/ec_payment?sslmode=disable # ADR-[[202606231000]]
      REDIS_URL: redis://broker:6379 # ADR-[[202606211200]]
    ports: ["8003:80"]
    depends_on:
      db-payment:
        condition: service_healthy
      broker:
        condition: service_healthy
    networks: [external-private]

  member:
    build:
      context: .
      dockerfile: server/member/Dockerfile
    environment:
      DATABASE_URL: postgres://member_svc:member_pass@db-customer:5432/ec_customer?sslmode=disable # ADR-[[202606231000]]
    ports: ["8004:80"]
    depends_on:
      db-customer:
        condition: service_healthy
    networks: [external-private]

  shipping:
    build:
      context: .
      dockerfile: server/shipping/docker/server.Dockerfile
    environment:
      DATABASE_URL: postgres://shipping_svc:shipping_pass@db-shipping:5432/ec_shipping?sslmode=disable # ADR-[[202606231000]]
    ports: ["8005:80"]
    depends_on:
      db-shipping:
        condition: service_healthy
    networks: [internal-private]

  # ADR-[[202606211200]]
  shipping-worker:
    build:
      context: .
      dockerfile: server/shipping/docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgres://shipping_svc:shipping_pass@db-shipping:5432/ec_shipping?sslmode=disable # ADR-[[202606231000]]
      REDIS_URL: redis://broker:6379
    depends_on:
      db-shipping:
        condition: service_healthy
      broker:
        condition: service_healthy
    networks: [internal-private]

  store:
    profiles: ["external"]
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: store
    environment:
      PORT: "5173"
      HOST: "0.0.0.0"
      NODE_ENV: production
      PRODUCT_API_URL: http://edge-proxy/product
      ORDER_API_URL: http://edge-proxy/order
      PAYMENT_API_URL: http://edge-proxy/payment
      MEMBER_API_URL: http://edge-proxy/member
    ports: ["5173:5173"]
    depends_on:
      edge-proxy:
        condition: service_healthy
    networks: [external-public]

  # マルチホーム接続で「社内 → 社外 OK」経路を表現する admin gateway。
  backoffice:
    profiles: ["internal"]
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: backoffice
    environment:
      PORT: "5175"
      HOST: "0.0.0.0"
      NODE_ENV: production
      PRODUCT_API_URL: http://product
      ORDER_API_URL: http://order
      SHIPPING_API_URL: http://shipping
    ports: ["5175:5175"]
    depends_on: [product, order, shipping]
    networks: [internal-public, internal-private, external-private]
