name: CI

on:
  push:
    branches: [main]
    paths: &trigger-paths
      - "server/**"
      - "client/**"
      - "scripts/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/ci.yml"
      - "compose.yaml"
  pull_request:
    paths: *trigger-paths

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# PR では GITHUB_SHA が merge commit になるため、coverage コメントのフッタには head sha を渡す。
env:
  COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  server-unit:
    name: server-unit-${{ matrix.service }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: [product, order, payment, member, shipping]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: format
        run: test -z "$(go fmt ./server/...)"

      - name: vet
        run: go vet ./server/${{ matrix.service }}/... ./server/internal/...

      - name: unit test
        run: |
          svc=${{ matrix.service }}
          go test ./server/$svc/... ./server/internal/... -short -count=1 -coverprofile=cover.out -covermode=atomic -coverpkg=./server/$svc/...,./server/internal/...

      # 除外・閾値は .testcoverage.yml に集約。gate 失敗でもコメントを残すため continue-on-error。
      - name: coverage check
        id: cov
        uses: vladopajic/go-test-coverage@a93b868a4cbcbf18dc3781650fad241f0020e609 # v2.18.8
        continue-on-error: true
        with:
          config: ./.testcoverage.yml
          breakdown-file-name: coverage-breakdown.txt

      # coverage-report.sh は渡した profile を丸ごと集計するので、gate と同じ除外後集合 (breakdown)
      # で絞らないとコメントの数値が gate とずれる。
      - name: build coverage report
        run: |
          cut -d';' -f1 coverage-breakdown.txt | sed 's#^#/#; s#$#:#' > allow.txt
          head -1 cover.out > cover.filtered.out
          grep -Ff allow.txt cover.out >> cover.filtered.out
          bash scripts/coverage-report.sh "server-unit-${{ matrix.service }}" cover.filtered.out > coverage.md

      # 単一マーカーだと 6 ジョブ (per-service 5 + integration) が同じコメントを奪い合うため。
      - name: comment coverage
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: coverage-server-unit-${{ matrix.service }}
          path: coverage.md

      - name: coverage gate
        if: steps.cov.outcome == 'failure'
        run: |
          echo "coverage below threshold (.testcoverage.yml)"; exit 1

  client:
    name: client-${{ matrix.package }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # api は build script を持たない (後段の build / typecheck は --if-present 前提)
        package: [store, mypage, backoffice, api]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: format
        run: pnpm format:check

      - name: typecheck
        run: pnpm -F "${{ matrix.package }}" run --if-present typecheck

      - name: coverage
        run: pnpm -F "${{ matrix.package }}" test:cov

      - name: report coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2.12.1
        with:
          name: ${{ matrix.package }}
          # 既定の repo root のままだと package 配下の coverage json/config を解決できない。
          working-directory: client/app/${{ matrix.package }}
          # v2.12.1 は閾値を読んでも Status が 🔵 のまま。60% 境界は server の coverage gate と揃える。
          threshold-icons: "{0: '🔴', 60: '🟢'}"

      - name: build
        run: pnpm -F "${{ matrix.package }}" run --if-present build

  server-integration:
    name: server-integration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: start db
        run: docker compose up -d --wait db-customer db-ops

      - name: migrate
        run: ./scripts/migrate.sh

      - name: test
        # 結合テストは実 DB 必須 (env が無いと testdb.Open が Fatal する)。CI では必ず DSN を渡す。
        env:
          DATABASE_URL_CUSTOMER: postgres://ec:ec_pass@localhost:5432/ec_customer?sslmode=disable
          DATABASE_URL_OPS: postgres://ec:ec_pass@localhost:5433/ec_ops?sslmode=disable
        run: go test ./server/... -count=1 -coverprofile=cover.out -covermode=atomic -coverpkg=./server/...

      # 除外・閾値は .testcoverage.yml に集約。gate 失敗でもコメントを残すため continue-on-error。
      - name: coverage check
        id: cov
        uses: vladopajic/go-test-coverage@a93b868a4cbcbf18dc3781650fad241f0020e609 # v2.18.8
        continue-on-error: true
        with:
          config: ./.testcoverage.yml
          breakdown-file-name: coverage-breakdown.txt

      # coverage-report.sh は渡した profile を丸ごと集計するので、gate と同じ除外後集合 (breakdown)
      # で絞らないとコメントの数値が gate とずれる。
      - name: build coverage report
        run: |
          cut -d';' -f1 coverage-breakdown.txt | sed 's#^#/#; s#$#:#' > allow.txt
          head -1 cover.out > cover.filtered.out
          grep -Ff allow.txt cover.out >> cover.filtered.out
          bash scripts/coverage-report.sh "server-integration" cover.filtered.out > coverage.md

      - name: comment coverage
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: coverage-server-integration
          path: coverage.md

      - name: coverage gate
        if: steps.cov.outcome == 'failure'
        run: |
          echo "coverage below threshold (.testcoverage.yml)"; exit 1
