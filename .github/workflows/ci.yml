name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: "0"

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-24.04
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - id: filter
        # 比較範囲: PR は base..HEAD、push は before..sha (新規 push の null SHA は HEAD~1 にフォールバック)。
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            range="origin/${GITHUB_BASE_REF}...HEAD"
          else
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="HEAD~1"
            fi
            range="${before}..${GITHUB_SHA}"
          fi
          changed=$(git diff --name-only "$range")
          echo "changed files:"; echo "$changed"
          has() { echo "$changed" | grep -qE "$1"; }
          has '^(server/|go\.(mod|sum)$|\.github/workflows/ci\.yml$)' && server=true || server=false
          has '^(client/|\.github/workflows/ci\.yml$)' && client=true || client=false
          echo "server=$server" | tee -a "$GITHUB_OUTPUT"
          echo "client=$client" | tee -a "$GITHUB_OUTPUT"

  server:
    name: server-${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: [product, order, payment, member, shipping]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: format
        run: test -z "$(go fmt ./server/...)"

      - name: vet
        run: go vet ./server/${{ matrix.service }}/... ./server/internal/...

      # 該当サービス + server/internal の共通基盤 (httperror 等) を対象に、
      # 手書きパッケージ (api/db/di と main.go を除外) のみを分母にカバレッジ計測。
      # -race は cgo を要するため workflow env の CGO_ENABLED=0 を上書きする。
      # 結合テストはこの job では走らせない (-short)。
      - name: coverage
        env:
          CGO_ENABLED: "1"
        run: |
          svc=${{ matrix.service }}
          pkgs=$(go list ./server/$svc/... ./server/internal/... | grep -vE '/api$|/internal/db$|/internal/di$|/server/[a-z]+$' | paste -sd, -)
          go test ./server/$svc/... ./server/internal/... -short -race -count=1 -coverprofile=cover.out -covermode=atomic -coverpkg="$pkgs"
          go tool cover -func=cover.out | tail -1

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: server-coverage-${{ matrix.service }}
          path: cover.out
          if-no-files-found: error

  client:
    name: client-${{ matrix.package }}
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # @ec/api は typecheck / build script 未定義のため pnpm run --if-present で skip させる
        package: [store, mypage, backoffice, "@ec/api"]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: format
        run: pnpm format:check

      - name: typecheck
        run: pnpm -F "${{ matrix.package }}" run --if-present typecheck

      - name: coverage
        run: pnpm -F "${{ matrix.package }}" test:cov

      - name: build
        run: pnpm -F "${{ matrix.package }}" run --if-present build

  coverage:
    name: coverage
    needs: server
    if: needs.changes.outputs.server == 'true' && always() && needs.server.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: server-coverage-*
          path: coverage

      - name: merge
        run: |
          go install github.com/wadey/gocovmerge@latest
          gocovmerge coverage/server-coverage-*/cover.out > cover.out
          go tool cover -func=cover.out | tail -1

      - uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1

  integration:
    name: integration
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-24.04
    # 顧客系 (db-customer) と運用系 (db-ops) を立てて結合テストを実行する。Issue #3 の受け皿。
    # 通常テストは -short で結合をスキップする想定。ここでは -short を付けずに全部実行する。
    services:
      db-customer:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ec
          POSTGRES_PASSWORD: ec_pass
          POSTGRES_DB: ec_customer
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ec -d ec_customer"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      db-ops:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ec
          POSTGRES_PASSWORD: ec_pass
          POSTGRES_DB: ec_ops
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U ec -d ec_ops"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL_CUSTOMER: postgres://ec:ec_pass@localhost:5432/ec_customer?sslmode=disable
      DATABASE_URL_OPS: postgres://ec:ec_pass@localhost:5433/ec_ops?sslmode=disable
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: migrate
        run: |
          go tool goose -dir server/order/db/migration   postgres "$DATABASE_URL_CUSTOMER" up
          go tool goose -dir server/payment/db/migration postgres "$DATABASE_URL_CUSTOMER" up
          go tool goose -dir server/member/db/migration  postgres "$DATABASE_URL_CUSTOMER" up
          go tool goose -dir server/product/db/migration postgres "$DATABASE_URL_OPS"      up
          go tool goose -dir server/shipping/db/migration postgres "$DATABASE_URL_OPS"     up

      - name: test
        env:
          CGO_ENABLED: "1"
        run: go test ./server/... -race -count=1
