name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-24.04
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
      integration: ${{ steps.filter.outputs.integration }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - id: filter
        # 新規 push の null SHA は HEAD~1 にフォールバック (それ以外は github.event.before を使う)。
        # server / client / integration の matrix を JSON 配列で出力する (空配列なら下流の job が skip)。
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            range="origin/${GITHUB_BASE_REF}...HEAD"
          else
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="HEAD~1"
            fi
            range="${before}..${GITHUB_SHA}"
          fi
          changed=$(git diff --name-only "$range")
          echo "changed files:"; echo "$changed"

          # workflow 自身や go.mod、server/internal の共通基盤など、サービス横断で影響するファイル
          if echo "$changed" | grep -qE '^(\.github/workflows/ci\.yml|go\.(mod|sum)|scripts/migrate\.sh|server/internal/)'; then
            cross_server=true
          else
            cross_server=false
          fi
          # client 全体に効くファイル (lockfile, ルート tsconfig / lint / 共通設定など)
          # workflow 自身の変更は cross_server に既に含まれるため、ここでは server を介して波及させる。
          if [ "$cross_server" = "true" ] || echo "$changed" | grep -qE '^client/(pnpm-(lock|workspace)\.yaml|tsconfig\.json|\.oxlintrc\.json|\.oxfmtrc\.json|mise\.toml)$'; then
            cross_client=true
          else
            cross_client=false
          fi

          # server matrix
          server_svcs=()
          for svc in product order payment member shipping; do
            if [ "$cross_server" = "true" ] || echo "$changed" | grep -qE "^server/${svc}/"; then
              server_svcs+=("\"$svc\"")
            fi
          done
          server_json="[$(IFS=,; echo "${server_svcs[*]}")]"
          echo "server=$server_json" | tee -a "$GITHUB_OUTPUT"

          # client matrix
          client_pkgs=()
          for entry in 'store:app/store' 'mypage:app/mypage' 'backoffice:app/backoffice' '@ec/api:package/api'; do
            pkg="${entry%%:*}"
            path="${entry##*:}"
            if [ "$cross_client" = "true" ] || echo "$changed" | grep -qE "^client/${path}/"; then
              client_pkgs+=("\"$pkg\"")
            fi
          done
          client_json="[$(IFS=,; echo "${client_pkgs[*]}")]"
          echo "client=$client_json" | tee -a "$GITHUB_OUTPUT"

          # integration: server に変更があれば走らせる
          if [ "$cross_server" = "true" ] || echo "$changed" | grep -qE '^server/'; then
            echo "integration=true" | tee -a "$GITHUB_OUTPUT"
          else
            echo "integration=false" | tee -a "$GITHUB_OUTPUT"
          fi

  server:
    name: server-${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.server != '[]'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.server) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: format
        run: test -z "$(go fmt ./server/...)"

      - name: vet
        run: go vet ./server/${{ matrix.service }}/... ./server/internal/...

      - name: coverage
        run: |
          svc=${{ matrix.service }}
          pkgs=$(go list ./server/$svc/... ./server/internal/... | grep -vE '/api$|/internal/db$|/internal/di$|/server/[a-z]+$' | paste -sd, -)
          go test ./server/$svc/... ./server/internal/... -short -race -count=1 -coverprofile=cover.out -covermode=atomic -coverpkg="$pkgs"

      - uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1

  client:
    name: client-${{ matrix.package }}
    needs: changes
    if: needs.changes.outputs.client != '[]'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # @ec/api は build script 未定義のため pnpm run --if-present で skip させる
        package: ${{ fromJson(needs.changes.outputs.client) }}
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: format
        run: pnpm format:check

      - name: typecheck
        run: pnpm -F "${{ matrix.package }}" run --if-present typecheck

      - name: coverage
        run: pnpm -F "${{ matrix.package }}" test:cov

      - name: report coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2.12.1
        with:
          name: ${{ matrix.package }}
          json-summary-path: client/${{ matrix.package == '@ec/api' && 'package/api' || format('app/{0}', matrix.package) }}/coverage/coverage-summary.json
          json-final-path: client/${{ matrix.package == '@ec/api' && 'package/api' || format('app/{0}', matrix.package) }}/coverage/coverage-final.json

      - name: build
        run: pnpm -F "${{ matrix.package }}" run --if-present build

  integration:
    name: integration
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: start db
        run: docker compose up -d --wait db-customer db-ops

      - name: migrate
        run: ./scripts/migrate.sh

      - name: test
        run: |
          pkgs=$(go list ./server/... | grep -vE '/api$|/internal/db$|/internal/di$|/server/[a-z]+$' | paste -sd, -)
          go test ./server/... -race -count=1 -coverprofile=cover.out -covermode=atomic -coverpkg="$pkgs"

      - uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
