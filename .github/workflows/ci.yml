name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: "0"

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/ci.yml'
            client:
              - 'client/**'
              - '.github/workflows/ci.yml'

  server-quality:
    name: server (fmt + vet)
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: fmt:check
        run: test -z "$(gofmt -l server/)" || (gofmt -l server/ && exit 1)

      - name: vet
        run: go vet ./...

  server-test:
    name: server-${{ matrix.service }} (test + coverage)
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [product, order, payment, member, shipping]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # 該当サービス + server/internal の共通基盤 (httperror 等) を対象に、
      # 手書きパッケージ (api/db/di と main.go を除外) のみを分母にカバレッジ計測。
      # -race は cgo を要するため workflow env の CGO_ENABLED=0 を上書きする。
      - name: "test + coverage (${{ matrix.service }})"
        env:
          CGO_ENABLED: "1"
        run: |
          svc=${{ matrix.service }}
          pkgs=$(go list ./server/$svc/... ./server/internal/... | grep -vE '/api$|/internal/db$|/internal/di$|/server/[a-z]+$' | paste -sd, -)
          go test ./server/$svc/... ./server/internal/... -race -count=1 -coverprofile=cover.out -covermode=atomic -coverpkg="$pkgs"
          go tool cover -func=cover.out | tail -1

      - name: coverage threshold (60%)
        run: |
          total=$(go tool cover -func=cover.out | awk '/^total:/ {sub("%",""); print $3}')
          threshold=60
          echo "coverage: $total% (threshold: $threshold%)"
          awk -v t="$total" -v th="$threshold" 'BEGIN { if (t+0 < th+0) { exit 1 } }'

      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-coverage-${{ matrix.service }}
          path: cover.out
          if-no-files-found: ignore

  client:
    name: client (pnpm)
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: format:check
        run: pnpm format:check

      - name: typecheck
        run: pnpm -r typecheck

      - name: "test + coverage (閾値: @ec/api 100% / app 60%)"
        run: pnpm -r test:cov

      - name: build
        run: pnpm -r build
