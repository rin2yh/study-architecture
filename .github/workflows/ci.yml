name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-24.04
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - id: filter
        # 新規 push の null SHA は HEAD~1 にフォールバック (それ以外は github.event.before を使う)。
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            range="origin/${GITHUB_BASE_REF}...HEAD"
          else
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="HEAD~1"
            fi
            range="${before}..${GITHUB_SHA}"
          fi
          changed=$(git diff --name-only "$range")
          echo "changed files:"; echo "$changed"
          has() { echo "$changed" | grep -qE "$1"; }
          has '^(server/|go\.(mod|sum)$|\.github/workflows/ci\.yml$)' && server=true || server=false
          has '^(client/|\.github/workflows/ci\.yml$)' && client=true || client=false
          echo "server=$server" | tee -a "$GITHUB_OUTPUT"
          echo "client=$client" | tee -a "$GITHUB_OUTPUT"

  server:
    name: server-${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: [product, order, payment, member, shipping]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: format
        run: test -z "$(go fmt ./server/...)"

      - name: vet
        run: go vet ./server/${{ matrix.service }}/... ./server/internal/...

      - name: coverage
        run: |
          svc=${{ matrix.service }}
          pkgs=$(go list ./server/$svc/... ./server/internal/... | grep -vE '/api$|/internal/db$|/internal/di$|/server/[a-z]+$' | paste -sd, -)
          go test ./server/$svc/... ./server/internal/... -short -race -count=1 -coverprofile=cover.out -covermode=atomic -coverpkg="$pkgs"

      - uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1

  client:
    name: client-${{ matrix.package }}
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # @ec/api は build script 未定義のため pnpm run --if-present で skip させる
        package: [store, mypage, backoffice, "@ec/api"]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: format
        run: pnpm format:check

      - name: typecheck
        run: pnpm -F "${{ matrix.package }}" run --if-present typecheck

      - name: coverage
        run: pnpm -F "${{ matrix.package }}" test:cov

      - name: build
        run: pnpm -F "${{ matrix.package }}" run --if-present build

  integration:
    name: integration
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-24.04
    env:
      DATABASE_URL_CUSTOMER: postgres://ec:ec_pass@localhost:5432/ec_customer?sslmode=disable
      DATABASE_URL_OPS: postgres://ec:ec_pass@localhost:5433/ec_ops?sslmode=disable
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: start db
        run: docker compose up -d --wait db-customer db-ops

      - name: migrate
        # db-customer を共有する 3 サービスで goose の version 表をサービス別に分けて衝突回避。
        run: |
          go tool goose -table goose_order_version    -dir server/order/db/migration    postgres "$DATABASE_URL_CUSTOMER" up
          go tool goose -table goose_payment_version  -dir server/payment/db/migration  postgres "$DATABASE_URL_CUSTOMER" up
          go tool goose -table goose_member_version   -dir server/member/db/migration   postgres "$DATABASE_URL_CUSTOMER" up
          go tool goose -table goose_product_version  -dir server/product/db/migration  postgres "$DATABASE_URL_OPS"      up
          go tool goose -table goose_shipping_version -dir server/shipping/db/migration postgres "$DATABASE_URL_OPS"      up

      - name: test
        run: |
          pkgs=$(go list ./server/... | grep -vE '/api$|/internal/db$|/internal/di$|/server/[a-z]+$' | paste -sd, -)
          go test ./server/... -race -count=1 -coverprofile=cover.out -covermode=atomic -coverpkg="$pkgs"

      - uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
