name: CI

on:
  push:
    branches: [main]
    paths: &trigger-paths
      - "server/**"
      - "client/**"
      - "scripts/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/ci.yml"
      - "compose.yaml"
  pull_request:
    paths: *trigger-paths

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: server-${{ matrix.service }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: [product, order, payment, member, shipping]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: format
        run: test -z "$(go fmt ./server/...)"

      - name: vet
        run: go vet ./server/${{ matrix.service }}/... ./server/internal/...

      - name: coverage
        id: cov
        run: |
          svc=${{ matrix.service }}
          pkgs=$(go list ./server/$svc/... ./server/internal/... | grep -vE '/api$|/internal/db$|/internal/di$|/internal/test/|/server/[a-z]+$' | paste -sd, -)
          go test ./server/$svc/... ./server/internal/... -short -race -count=1 -coverprofile=cover.out -covermode=atomic -coverpkg="$pkgs"
          echo "total=$(go tool cover -func=cover.out | awk '/^total:/ {print $3}')" >> "$GITHUB_OUTPUT"
          bash scripts/coverage-report.sh "server-$svc" cover.out > coverage.md

      # 単一マーカーだと 6 ジョブ (per-service 5 + integration) が同じコメントを奪い合うため。
      - name: comment coverage
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: coverage-server-${{ matrix.service }}
          path: coverage.md

      - name: coverage gate
        env:
          TOTAL: ${{ steps.cov.outputs.total }}
        run: |
          awk -v t="${TOTAL%\%}" 'BEGIN { exit (t + 0 >= 60) ? 0 : 1 }' \
            || { echo "coverage ${TOTAL} is below 60%"; exit 1; }

  client:
    name: client-${{ matrix.package }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # api は build script を持たない (後段の build / typecheck は --if-present 前提)
        package: [store, mypage, backoffice, api]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: format
        run: pnpm format:check

      - name: typecheck
        run: pnpm -F "${{ matrix.package }}" run --if-present typecheck

      - name: coverage
        run: pnpm -F "${{ matrix.package }}" test:cov

      - name: report coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2.12.1
        with:
          name: ${{ matrix.package }}
          json-summary-path: client/app/${{ matrix.package }}/coverage/coverage-summary.json
          json-final-path: client/app/${{ matrix.package }}/coverage/coverage-final.json

      - name: build
        run: pnpm -F "${{ matrix.package }}" run --if-present build

  server-integration:
    name: server-integration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: start db
        run: docker compose up -d --wait db-customer db-ops

      - name: migrate
        run: ./scripts/migrate.sh

      - name: test
        id: cov
        # env が無いと結合テストは全 skip し、緑でも実 DB を一切検証しない状態になる
        env:
          DATABASE_URL_CUSTOMER: postgres://ec:ec_pass@localhost:5432/ec_customer?sslmode=disable
          DATABASE_URL_OPS: postgres://ec:ec_pass@localhost:5433/ec_ops?sslmode=disable
        run: |
          pkgs=$(go list ./server/... | grep -vE '/api$|/internal/db$|/internal/di$|/internal/test/|/server/[a-z]+$' | paste -sd, -)
          # -p 1: 同一サービスの repository / handler が同じ table を共有するため、並列実行だと
          # TRUNCATE/seed が競合する。逐次実行で直列化する。
          go test ./server/... -race -count=1 -p 1 -coverprofile=cover.out -covermode=atomic -coverpkg="$pkgs"
          echo "total=$(go tool cover -func=cover.out | awk '/^total:/ {print $3}')" >> "$GITHUB_OUTPUT"
          bash scripts/coverage-report.sh "server-integration" cover.out > coverage.md

      - name: comment coverage
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: coverage-server-integration
          path: coverage.md

      - name: coverage gate
        env:
          TOTAL: ${{ steps.cov.outputs.total }}
        run: |
          awk -v t="${TOTAL%\%}" 'BEGIN { exit (t + 0 >= 60) ? 0 : 1 }' \
            || { echo "coverage ${TOTAL} is below 60%"; exit 1; }
