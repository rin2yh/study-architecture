name: Visual Regression Test

# ベースライン更新は vrt-baseline.yml に分離 (ADR-202606220600)。
on:
  push:
    branches: [main]
    paths: &vrt-paths
      - "client/app/store/**"
      - "client/app/ui/**"
      - "client/pnpm-lock.yaml"
      - ".github/workflows/vrt.yml"
  pull_request:
    paths: *vrt-paths

permissions:
  contents: read

concurrency:
  group: vrt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client-store-vrt:
    name: client-store-vrt
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      # postinstall は deny しているので、ブラウザと OS 依存はここで明示取得する。
      - name: install chromium
        run: pnpm -F store exec playwright install --with-deps chromium

      - name: vrt
        env:
          STORYBOOK_DISABLE_TELEMETRY: "1"
        run: |
          set -eu
          pnpm -F store build-storybook
          pnpm -F store exec http-server storybook-static -p 6006 --silent &
          pnpm -F store exec wait-on tcp:127.0.0.1:6006
          pnpm -F store exec test-storybook --ci --url http://127.0.0.1:6006

      - name: upload vrt diff
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vrt-diff
          path: client/app/store/__vrt__/__snapshots__/__diff_output__/
          if-no-files-found: ignore
