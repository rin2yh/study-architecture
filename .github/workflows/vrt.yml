name: Visual Regression Test

# ベースラインはリポジトリに置かず main の成果物 (artifact) に持つ。PR は main のベースラインと
# 比較するだけ、main へ merge されたら撮り直して更新する (ADR-202606220600)。
on:
  push:
    branches: [main]
    paths: &vrt-paths
      - "client/app/store/**"
      - "client/app/ui/**"
      - "client/pnpm-lock.yaml"
      - ".github/workflows/vrt.yml"
  pull_request:
    paths: *vrt-paths

permissions:
  contents: read
  # PR ジョブが main 実行のベースライン artifact を取得するため。
  actions: read

concurrency:
  group: vrt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client-store-vrt:
    name: client-store-vrt
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: client/app/store
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: install
        working-directory: client
        run: pnpm install --frozen-lockfile

      # postinstall は deny しているので、ブラウザと OS 依存はここで明示取得する。
      - name: install chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: build storybook
        env:
          STORYBOOK_DISABLE_TELEMETRY: "1"
        run: pnpm build-storybook

      - name: serve storybook
        run: |
          set -eu
          pnpm exec http-server storybook-static -p 6006 --silent &
          pnpm exec wait-on tcp:127.0.0.1:6006

      - name: update baselines (main)
        if: github.event_name == 'push'
        run: pnpm exec test-storybook -u --url http://127.0.0.1:6006

      - name: upload baselines (main)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vrt-baselines
          path: client/app/store/__vrt__/__snapshots__/
          retention-days: 90

      - name: download baselines (PR)
        id: baseline
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          run_id=$(gh run list -w vrt.yml -b main -e push -s success -L 1 \
            --json databaseId --jq '.[0].databaseId // empty' 2>/dev/null || true)
          if [ -n "$run_id" ] && gh run download "$run_id" -n vrt-baselines -D __vrt__/__snapshots__ 2>/dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::main にベースライン未確立のため VRT 比較をスキップ"
          fi

      - name: compare (PR)
        if: github.event_name == 'pull_request' && steps.baseline.outputs.found == 'true'
        run: pnpm exec test-storybook --ci --url http://127.0.0.1:6006

      - name: upload vrt diff
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vrt-diff
          path: client/app/store/__vrt__/__snapshots__/__diff_output__/
          if-no-files-found: ignore
