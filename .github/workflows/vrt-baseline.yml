name: Visual Regression Test (baseline)

# 「差分が出たら自動更新」は意図しない退行も受け入れるため、更新は人間の承認 (vrt:update ラベル) 起点
# に限定する。比較ゲート (vrt.yml) と同じ ubuntu-24.04 + Playwright で撮るので差分が出ない。
# 方針は ADR-202606220600。
on:
  pull_request:
    types: [labeled]

permissions:
  contents: write

concurrency:
  group: vrt-baseline-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: vrt-baseline
    if: github.event.label.name == 'vrt:update'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: client/app/store
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: install
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: install chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: regenerate baselines
        env:
          STORYBOOK_DISABLE_TELEMETRY: "1"
        run: |
          set -eu
          pnpm build-storybook
          pnpm exec http-server storybook-static -p 6006 --silent &
          pnpm exec wait-on tcp:127.0.0.1:6006
          pnpm exec test-storybook -u --url http://127.0.0.1:6006

      - name: commit baselines
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" config user.name "github-actions[bot]"
          git -C "$GITHUB_WORKSPACE" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$GITHUB_WORKSPACE" add client/app/store/__vrt__/__snapshots__
          if git -C "$GITHUB_WORKSPACE" diff --cached --quiet; then
            echo "ベースラインに変化なし"
          else
            git -C "$GITHUB_WORKSPACE" commit -m "test(store): VRT ベースラインを更新"
            git -C "$GITHUB_WORKSPACE" push origin "HEAD:${HEAD_BRANCH}"
          fi
