name: VRT baseline

# 「差分が出たら自動更新」は意図しない退行も受け入れるため、更新は人間の承認 (ラベル/dispatch) 起点
# に限定する。比較ゲート (vrt.yml) と同じ ubuntu-24.04 + Playwright で撮るので差分が出ない。
# 方針は ADR-202606220600。
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 撮り直す対象ブランチ
        required: true
  pull_request:
    types: [labeled]

permissions:
  contents: write

concurrency:
  group: vrt-baseline-${{ github.event.pull_request.head.ref || inputs.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: vrt-baseline
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'vrt:update'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # VRT_PAT があれば push が比較ゲートを再発火し HEAD が green になる。無ければ
          # GITHUB_TOKEN にフォールバックし、再発火しないぶん CI の手動再実行が要る。
          token: ${{ secrets.VRT_PAT || github.token }}
          ref: ${{ github.event.pull_request.head.ref || inputs.ref }}
          persist-credentials: true

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: install chromium
        run: pnpm -F store exec playwright install --with-deps chromium

      - name: regenerate baselines
        env:
          STORYBOOK_DISABLE_TELEMETRY: "1"
        run: |
          set -eu
          pnpm -F store build-storybook
          pnpm -F store exec http-server storybook-static -p 6006 --silent &
          pnpm -F store exec wait-on tcp:127.0.0.1:6006
          pnpm -F store exec test-storybook -u --url http://127.0.0.1:6006

      - name: commit baselines
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || inputs.ref }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" config user.name "github-actions[bot]"
          git -C "$GITHUB_WORKSPACE" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$GITHUB_WORKSPACE" add client/app/store/__vrt__/__snapshots__
          if git -C "$GITHUB_WORKSPACE" diff --cached --quiet; then
            echo "ベースラインに変化なし"
          else
            git -C "$GITHUB_WORKSPACE" commit -m "test(store): VRT ベースラインを更新"
            git -C "$GITHUB_WORKSPACE" push origin "HEAD:${HEAD_BRANCH}"
          fi
