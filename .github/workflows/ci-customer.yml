name: CI (customer)

# 顧客系量子 (store / order / payment / member / db-order)。分割根拠は ADR-[[202606220716]]。
on:
  push:
    branches: [main]
    # 共有 lib ブロックは backoffice 側と同一内容を複製する (anchor はファイルを跨げない。ADR-[[202606220716]])。
    paths: &trigger-paths
      - "server/order/**"
      - "server/payment/**"
      - "server/member/**"
      - "client/app/store/**"
      - "client/e2e/**"
      - "server/internal/**"
      - "server/tools/**"
      - "go.mod"
      - "go.sum"
      - "client/app/ui/**"
      - "client/app/api/**"
      - "client/pnpm-workspace.yaml"
      - "client/pnpm-lock.yaml"
      - "client/package.json"
      - "client/tsconfig.json"
      - "client/.oxlintrc.json"
      - "client/.oxfmtrc.json"
      - "scripts/**"
      - "compose.yaml"
      - ".github/actions/**"
      - ".github/workflows/ci-customer.yml"
  pull_request:
    paths: *trigger-paths

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-customer-${{ github.ref }}
  cancel-in-progress: true

# PR では GITHUB_SHA が merge commit になるため、coverage コメントのフッタには head sha を渡す。
env:
  COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-pnpm

      - name: lint
        run: pnpm lint

      - name: format
        run: pnpm format:check

  client:
    name: client-${{ matrix.package }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        package: [store]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-pnpm

      - name: typecheck
        run: pnpm -F "${{ matrix.package }}" run --if-present typecheck

      - name: coverage
        run: pnpm -F "${{ matrix.package }}" test:cov

      - name: report coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2.12.1
        with:
          name: ${{ matrix.package }}
          # 既定の repo root のままだと package 配下の coverage json/config を解決できない。
          working-directory: client/app/${{ matrix.package }}
          # v2.12.1 は閾値を読んでも Status が 🔵 のまま。60% 境界は server の coverage gate と揃える。
          threshold-icons: "{0: '🔴', 60: '🟢'}"

      - name: build
        run: pnpm -F "${{ matrix.package }}" run --if-present build

  server-lint:
    name: server-lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: format
        run: test -z "$(go fmt ./server/...)"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          args: ./server/...

  server-test:
    name: server-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: ./.github/actions/setup-goose

      - name: start db
        run: docker compose up -d --wait db-order db-payment db-member

      - name: migrate
        run: |
          for svc in order payment member; do
            ./scripts/migrate.sh "$svc"
          done

      - name: test
        id: cov
        # 結合テストは実 DB 必須 (env が無いと testdb.Open が Fatal する)。CI では必ず DSN を渡す。
        env:
          DATABASE_URL_ORDER: postgres://ec:ec_pass@localhost:5432/ec_order?sslmode=disable
          DATABASE_URL_PAYMENT: postgres://ec:ec_pass@localhost:5434/ec_payment?sslmode=disable
          DATABASE_URL_MEMBER: postgres://ec:ec_pass@localhost:5436/ec_member?sslmode=disable
        run: |
          target="./server/order/... ./server/payment/... ./server/member/... ./server/internal/..."
          pkgs=$(go run ./server/tools/coverpkg $target)
          go test $target -count=1 -coverprofile=cover.out -covermode=atomic -coverpkg="$pkgs"
          echo "total=$(go tool cover -func=cover.out | awk '/^total:/ {print $3}')" >> "$GITHUB_OUTPUT"
          bash scripts/coverage-report.sh "server-test-customer" cover.out > coverage.md

      - name: comment coverage
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: coverage-server-test-customer
          path: coverage.md

      - name: coverage gate
        env:
          TOTAL: ${{ steps.cov.outputs.total }}
        run: |
          awk -v t="${TOTAL%\%}" 'BEGIN { exit (t + 0 >= 60) ? 0 : 1 }' \
            || { echo "coverage ${TOTAL} is below 60%"; exit 1; }

  e2e:
    name: e2e
    runs-on: ubuntu-24.04
    needs: [code-quality, client, server-lint, server-test]
    defaults:
      run:
        working-directory: client/e2e
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-goose

      - uses: ./.github/actions/setup-node-pnpm

      - name: install playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: start stack
        working-directory: ${{ github.workspace }}
        run: ./scripts/e2e-up.sh store

      - name: e2e
        run: pnpm test --project=store

      - name: compose logs
        if: failure()
        working-directory: ${{ github.workspace }}
        run: docker compose --profile external logs --no-color
