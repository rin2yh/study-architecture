name: CI (shared packages)

# 共有パッケージ ui / api 専用の CI。複数 app が参照する「量子ではない」共有ライブラリで、
# それ自身が変わったときだけ独立に検証する (根拠 ADR-[[202606220716]])。
on:
  push:
    branches: [main]
    paths: &trigger-paths
      - "client/app/ui/**"
      - "client/app/api/**"
      - "client/pnpm-workspace.yaml"
      - "client/pnpm-lock.yaml"
      - "client/package.json"
      - "client/tsconfig.json"
      - "client/.oxlintrc.json"
      - "client/.oxfmtrc.json"
      - ".github/workflows/ci-shared.yml"
  pull_request:
    paths: *trigger-paths

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-shared-${{ github.ref }}
  cancel-in-progress: true

env:
  COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  client-ui-quality:
    name: client-ui-quality
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm -F ui typecheck

  client-api-test:
    name: client-api-test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm -F api run --if-present typecheck

      - name: coverage
        run: pnpm -F api test:cov

      - name: report coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2.12.1
        with:
          name: api
          working-directory: client/app/api
          # v2.12.1 は閾値を読んでも Status が 🔵 のまま。60% 境界は server の coverage gate と揃える。
          threshold-icons: "{0: '🔴', 60: '🟢'}"
