name: setup-go
description: go.mod のバージョンに追従して Go をセットアップする (モジュールキャッシュ有効)

# CI 規約 (ci.md): mise を使わず setup 系 action を直接呼ぶ / uses は最新版 + 40 桁 SHA で pin する
runs:
  using: composite
  steps:
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: true
