name: install-goose
description: goose の prebuilt バイナリを /usr/local/bin に導入する

runs:
  using: composite
  steps:
    - name: install goose
      shell: bash
      # prebuilt が無いと go tool goose で全 DB ドライバを毎回ビルドして遅い (server-integration / e2e で共用)。
      run: |
        curl -fsSL -o /usr/local/bin/goose \
          https://github.com/pressly/goose/releases/download/v3.27.1/goose_linux_x86_64
        chmod +x /usr/local/bin/goose
