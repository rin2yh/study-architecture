name: setup-node-pnpm
description: pnpm / Node をセットアップし client workspace の依存をインストールする

# CI 規約 (ci.md): mise を使わず setup 系 action を直接呼ぶ / uses は最新版 + 40 桁 SHA で pin する
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        version: 11

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22
        cache: pnpm
        cache-dependency-path: client/pnpm-lock.yaml

    - name: install
      shell: bash
      # workspace ルートから入れれば app/* と e2e を一括で frozen install できる (pnpm-workspace.yaml)。
      working-directory: client
      run: pnpm install --frozen-lockfile
