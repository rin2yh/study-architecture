version: "2"
sql:
  - engine: "postgresql"
    # 中央集約した goose マイグレーションをそのまま schema 入力にする（SSOT）。
    # sqlc は -- +goose Down 以降を無視してパースする。
    schema: "db/migration"
    queries: "db/query"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        json_tags_case_style: "camel"
        emit_interface: true
        emit_empty_slices: true
        omit_unused_structs: true
