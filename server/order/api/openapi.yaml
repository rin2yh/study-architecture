openapi: 3.0.3
info:
  title: Order Service API
  version: 0.1.0
  description: 注文ドメイン。カート確定 (checkout) で注文を作成し、注文の一覧/取得と状態更新を提供する。
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      tags: [system]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        default:
          $ref: "#/components/responses/Error"
  /orders:
    get:
      operationId: listOrders
      summary: 注文一覧
      tags: [order]
      parameters:
        - $ref: "#/components/parameters/MemberIdHeader"
      responses:
        "200":
          description: 注文の配列
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createOrder
      summary: 注文を作成
      tags: [order]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: 作成された注文
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        default:
          $ref: "#/components/responses/Error"
  /checkout:
    post:
      operationId: checkout
      summary: カートを確定して注文を作成し決済を手配 (明細に商品をスナップショット)
      tags: [order]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "201":
          description: 確定した注文 (スナップショットした明細を含む)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        default:
          $ref: "#/components/responses/Error"
  /orders/{id}:
    get:
      operationId: getOrder
      summary: 注文を取得
      tags: [order]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: 注文
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        default:
          $ref: "#/components/responses/Error"
    put:
      operationId: updateOrder
      summary: 注文を更新
      tags: [order]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderRequest"
      responses:
        "200":
          description: 更新された注文
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        default:
          $ref: "#/components/responses/Error"
components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      description: リソース ID
      schema:
        type: integer
        format: int64
    MemberIdHeader:
      name: X-Member-Id
      in: header
      required: false
      description: >-
        認証済み会員 id。UI のサーバ側ローダがセッション検証後に付与する。
        与えられた場合はその会員の注文だけに絞り込む (ADR-[[202606211100]])。
      schema:
        type: integer
        format: int64
  responses:
    Error:
      description: エラー (全サービス共通フォーマット — ErrorJSON ミドルウェアが整形)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: >-
            機械可読なエラー種別 (snake_case)。取りうる値は共通ミドルウェア
            server/internal/middleware (ErrorJSON / AppError) を唯一の出所とする。
          example: not_found
        message:
          type: string
          description: 人間可読なエラー説明 (内部詳細を含む 500 系は固定文言に伏せる)
          example: order 99 not found
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    Order:
      type: object
      required: [id, memberId, status, totalCents, createdAt]
      properties:
        id:
          type: integer
          format: int64
        memberId:
          type: integer
          format: int64
        status:
          type: string
        totalCents:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
    OrderItem:
      type: object
      required: [productId, productName, unitPriceCents, quantity]
      properties:
        productId:
          type: integer
          format: int64
        productName:
          type: string
        unitPriceCents:
          type: integer
          format: int64
        quantity:
          type: integer
    CheckoutItem:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
          format: int64
          x-oapi-codegen-extra-tags:
            binding: required,gt=0
        quantity:
          type: integer
          x-oapi-codegen-extra-tags:
            binding: required,gt=0
    CheckoutRequest:
      type: object
      required: [memberId, paymentMethod, items]
      properties:
        memberId:
          type: integer
          format: int64
          x-oapi-codegen-extra-tags:
            binding: required,gt=0
        paymentMethod:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
        items:
          type: array
          items:
            $ref: "#/components/schemas/CheckoutItem"
          x-oapi-codegen-extra-tags:
            binding: required,min=1,dive
    CreateOrderRequest:
      type: object
      required: [memberId, status, totalCents]
      properties:
        memberId:
          type: integer
          format: int64
          x-oapi-codegen-extra-tags:
            binding: required,gt=0
        status:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
        totalCents:
          type: integer
          format: int64
    UpdateOrderRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
