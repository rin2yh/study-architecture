openapi: 3.0.3
info:
  title: Product Service API
  version: 0.1.0
  description: 商品ドメイン。Step 0 の薄い骨格（liveness + 一覧）。
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      tags: [system]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        default:
          $ref: "#/components/responses/Error"
  /products:
    get:
      operationId: listProducts
      summary: 商品一覧
      tags: [product]
      responses:
        "200":
          description: 商品の配列
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createProduct
      summary: 商品を作成
      tags: [product]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: 作成された商品
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        default:
          $ref: "#/components/responses/Error"
  /products/{id}:
    get:
      operationId: getProduct
      summary: 商品を取得
      tags: [product]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: 商品
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        default:
          $ref: "#/components/responses/Error"
    put:
      operationId: updateProduct
      summary: 商品を更新
      tags: [product]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: 更新された商品
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        default:
          $ref: "#/components/responses/Error"
components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      description: リソース ID
      schema:
        type: integer
        format: int64
  responses:
    Error:
      description: エラー (全サービス共通フォーマット — ErrorJSON ミドルウェアが整形)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: >-
            機械可読なエラー種別 (snake_case)。取りうる値は共通ミドルウェア
            server/internal/middleware (ErrorJSON / AppError) を唯一の出所とする。
          example: not_found
        message:
          type: string
          description: 人間可読なエラー説明 (内部詳細を含む 500 系は固定文言に伏せる)
          example: product 99 not found
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    Product:
      type: object
      required: [id, sku, name, priceCents, createdAt]
      properties:
        id:
          type: integer
          format: int64
        sku:
          type: string
        name:
          type: string
        priceCents:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
    CreateProductRequest:
      type: object
      required: [sku, name, priceCents]
      properties:
        sku:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
        name:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
        priceCents:
          type: integer
          format: int64
    UpdateProductRequest:
      type: object
      required: [name, priceCents]
      properties:
        name:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
        priceCents:
          type: integer
          format: int64
