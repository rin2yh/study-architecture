openapi: 3.0.3
info:
  title: Product Service API
  version: 0.1.0
  description: 商品ドメイン。Step 0 の薄い骨格（liveness + 一覧）。
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      tags: [system]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        default:
          $ref: "#/components/responses/Error"
  /products:
    get:
      operationId: listProducts
      summary: 商品一覧
      tags: [product]
      responses:
        "200":
          description: 商品の配列
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        default:
          $ref: "#/components/responses/Error"
components:
  responses:
    Error:
      description: エラー (全サービス共通フォーマット — ErrorJSON ミドルウェアが整形)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: >-
            機械可読なエラー種別。
            bad_request (400) / not_found (404) / conflict (409) /
            unprocessable_entity (422) / internal (500) など。
          example: not_found
        message:
          type: string
          description: 人間可読なエラー説明 (内部詳細を含む 500 系は固定文言に伏せる)
          example: product 99 not found
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    Product:
      type: object
      required: [id, sku, name, priceCents, createdAt]
      properties:
        id:
          type: integer
          format: int64
        sku:
          type: string
        name:
          type: string
        priceCents:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
