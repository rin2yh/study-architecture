version: "2"
sql:
  - engine: "postgresql"
    # 中央集約した goose マイグレーションをそのまま schema 入力にする（SSOT）。
    # sqlc は -- +goose Down 以降を無視してパースする。
    schema: "../../db/migration/customer"
    queries: "db/query"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        json_tags_case_style: "camel"
        emit_interface: true # Querier interface を生成（モック容易化）
        emit_empty_slices: true # :many は nil でなく空スライスを返す
        omit_unused_structs: true # このサービスの query が触れる型だけ生成
