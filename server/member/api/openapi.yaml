openapi: 3.0.3
info:
  title: Member Service API
  version: 0.1.0
  description: 会員ドメイン。Step 0 の薄い骨格（liveness + 一覧）。
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      tags: [system]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        default:
          $ref: "#/components/responses/Error"
  /members:
    get:
      operationId: listMembers
      summary: 会員一覧
      tags: [member]
      responses:
        "200":
          description: 会員の配列
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createMember
      summary: 会員を作成
      tags: [member]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberRequest"
      responses:
        "201":
          description: 作成された会員
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
  /sessions:
    post:
      operationId: createSession
      summary: ログイン (セッション作成)
      tags: [session]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: 作成されたセッション (id は Cookie に載せる生トークン)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        default:
          $ref: "#/components/responses/Error"
  /sessions/{id}:
    get:
      operationId: getSession
      summary: セッション検証 (id から会員を引く)
      tags: [session]
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
      responses:
        "200":
          description: 有効なセッション
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteSession
      summary: ログアウト (セッション破棄)
      tags: [session]
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
      responses:
        "204":
          description: 破棄済み (存在しない id でも冪等に 204)
        default:
          $ref: "#/components/responses/Error"
  /members/{id}:
    get:
      operationId: getMember
      summary: 会員を取得
      tags: [member]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: 会員
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
    put:
      operationId: updateMember
      summary: 会員を更新
      tags: [member]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          description: 更新された会員
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      description: リソース ID
      schema:
        type: integer
        format: int64
    SessionIdPath:
      name: id
      in: path
      required: true
      description: セッションの不透明トークン (Cookie に載る生の値)
      schema:
        type: string
  responses:
    Error:
      description: エラー (全サービス共通フォーマット — ErrorJSON ミドルウェアが整形)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: >-
            機械可読なエラー種別 (snake_case)。取りうる値は共通ミドルウェア
            server/internal/middleware (ErrorJSON / AppError) を唯一の出所とする。
          example: not_found
        message:
          type: string
          description: 人間可読なエラー説明 (内部詳細を含む 500 系は固定文言に伏せる)
          example: member 99 not found
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    Member:
      type: object
      required: [id, email, displayName, createdAt]
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        displayName:
          type: string
        createdAt:
          type: string
          format: date-time
    CreateMemberRequest:
      type: object
      required: [email, displayName, password]
      properties:
        email:
          type: string
          format: email
          x-oapi-codegen-extra-tags:
            binding: required,email
        displayName:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
        password:
          type: string
          minLength: 8
          description: 平文。サーバ側で bcrypt ハッシュ化して保存する。
          x-oapi-codegen-extra-tags:
            binding: required,min=8
    CreateSessionRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          x-oapi-codegen-extra-tags:
            binding: required,email
        password:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
    Session:
      type: object
      required: [id, memberId, expiresAt]
      properties:
        id:
          type: string
          description: 不透明トークン。Cookie に載せ、検証/破棄時に {id} として送る。
        memberId:
          type: integer
          format: int64
        expiresAt:
          type: string
          format: date-time
    UpdateMemberRequest:
      type: object
      required: [email, displayName]
      properties:
        email:
          type: string
          format: email
          x-oapi-codegen-extra-tags:
            binding: required,email
        displayName:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
