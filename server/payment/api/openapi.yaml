openapi: 3.0.3
info:
  title: Payment Service API
  version: 0.1.0
  description: 決済ドメイン。Step 0 の薄い骨格（liveness + 一覧）。
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      tags: [system]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        default:
          $ref: "#/components/responses/Error"
  /payments:
    get:
      operationId: listPayments
      summary: 決済一覧
      tags: [payment]
      responses:
        "200":
          description: 決済の配列
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createPayment
      summary: 決済を作成
      tags: [payment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentRequest"
      responses:
        "201":
          description: 作成された決済
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        default:
          $ref: "#/components/responses/Error"
  /payments/{id}:
    get:
      operationId: getPayment
      summary: 決済を取得
      tags: [payment]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: 決済
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        default:
          $ref: "#/components/responses/Error"
    put:
      operationId: updatePayment
      summary: 決済を更新
      tags: [payment]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePaymentRequest"
      responses:
        "200":
          description: 更新された決済
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        default:
          $ref: "#/components/responses/Error"
components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      description: リソース ID
      schema:
        type: integer
        format: int64
  responses:
    Error:
      description: エラー (全サービス共通フォーマット — ErrorJSON ミドルウェアが整形)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: >-
            機械可読なエラー種別 (snake_case)。取りうる値は共通ミドルウェア
            server/internal/middleware (ErrorJSON / AppError) を唯一の出所とする。
          example: not_found
        message:
          type: string
          description: 人間可読なエラー説明 (内部詳細を含む 500 系は固定文言に伏せる)
          example: payment 99 not found
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    Payment:
      type: object
      required: [id, orderId, amountCents, method, status, createdAt]
      properties:
        id:
          type: integer
          format: int64
        orderId:
          type: integer
          format: int64
        amountCents:
          type: integer
          format: int64
        method:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
    CreatePaymentRequest:
      type: object
      required: [orderId, amountCents, method, status]
      properties:
        orderId:
          type: integer
          format: int64
          x-oapi-codegen-extra-tags:
            binding: required,gt=0
        amountCents:
          type: integer
          format: int64
        method:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
        status:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
    UpdatePaymentRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
