# mise.toml (server) — Go と Go tasks を server/ 配下に閉じる。
# コード生成ツール (oapi-codegen / sqlc / kessoku / goose) は go.mod の tool ディレクティブで
# 管理して `go tool <name>` で呼ぶ (バージョンは go.mod に固定)。

[tools]
go = "1.26"

[env]
CGO_ENABLED = "0"
# ホストから goose を叩く DSN ([[ADR 0012]] で顧客系 / 運用系 を分離)。
DATABASE_URL_CUSTOMER = "postgres://ec:ec_pass@localhost:5432/ec_customer?sslmode=disable"
DATABASE_URL_OPS = "postgres://ec:ec_pass@localhost:5433/ec_ops?sslmode=disable"

# 各 task は cd .. でリポジトリルートを cwd にし、go list / generate のパス指定を素直に書ける形にする。

# ───────────────────────── コード生成 ─────────────────────────
[tasks.gen]
description = "コード生成一式 (sqlc → oapi-codegen → kessoku)"
dir = ".."
run = [
  "go generate -run sqlc ./...",
  "go generate -run oapi-codegen ./...",
  "go generate -run kessoku ./...",
  "go mod tidy",
]

# ───────────────────────── マイグレーション ─────────────────────────
# migration は各サービス内 (server/<svc>/db/migration) に置く ([[ADR 0013]])。
# 顧客系 (db-customer) 向け: order / payment / member
# 運用系 (db-ops) 向け:      product / shipping

[tasks."migrate:order"]
description = "order の goose up (db-customer)"
dir = ".."
run = 'go tool goose -dir server/order/db/migration postgres "$DATABASE_URL_CUSTOMER" up'

[tasks."migrate:payment"]
description = "payment の goose up (db-customer)"
dir = ".."
run = 'go tool goose -dir server/payment/db/migration postgres "$DATABASE_URL_CUSTOMER" up'

[tasks."migrate:member"]
description = "member の goose up (db-customer)"
dir = ".."
run = 'go tool goose -dir server/member/db/migration postgres "$DATABASE_URL_CUSTOMER" up'

[tasks."migrate:product"]
description = "product の goose up (db-ops)"
dir = ".."
run = 'go tool goose -dir server/product/db/migration postgres "$DATABASE_URL_OPS" up'

[tasks."migrate:shipping"]
description = "shipping の goose up (db-ops)"
dir = ".."
run = 'go tool goose -dir server/shipping/db/migration postgres "$DATABASE_URL_OPS" up'

[tasks.migrate]
description = "5 サービス分の goose up を順に流す"
depends = [
  "migrate:order",
  "migrate:payment",
  "migrate:member",
  "migrate:product",
  "migrate:shipping",
]
run = "echo 'all migrated'"

# ───────────────────────── Go ビルド/検査 ─────────────────────────
[tasks.build]
description = "全サービスをビルド"
dir = ".."
run = "go build ./..."

[tasks.test]
description = "テスト実行"
dir = ".."
run = "go test ./... -race -count=1"

[tasks.vet]
description = "go vet"
dir = ".."
run = "go vet ./..."

[tasks.fmt]
description = "gofmt 整形"
dir = ".."
run = "gofmt -w server/"

[tasks."fmt:check"]
description = "未整形ファイルを検出"
dir = ".."
run = 'test -z "$(gofmt -l server/)" || (gofmt -l server/ && exit 1)'

[tasks.tidy]
description = "go mod tidy"
dir = ".."
run = "go mod tidy"

[tasks.cover]
description = "テストカバレッジ計測 (生成コード api/db/di と main.go を分母から除外)"
dir = ".."
run = [
  "go test ./server/... -coverprofile=cover.out -covermode=atomic -coverpkg=$(go list ./server/... | grep -vE '/api$|/internal/db$|/internal/di$|/server/[a-z]+$' | paste -sd, -)",
  "go tool cover -func=cover.out | tail -1",
]

[tasks.ci]
description = "CI 相当 (fmt:check → vet → test)"
depends = ["fmt:check", "vet", "test"]
run = "echo 'CI OK'"
