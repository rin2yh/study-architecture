# 社内専用 (運用向け) リソース。
# - 運用 UI (backoffice)
# - 運用 DB (db-ops) と volume (pg_ops_data)
# 共通の network 定義は compose.yaml 側。

volumes:
  pg_ops_data:

# migrate-* サービスの共通定義 (YAML anchor)。command の -table と -dir だけが各サービスで違う。
x-migrate-ops: &migrate-ops
  image: ec-migrate
  build:
    context: .
    dockerfile: Dockerfile.migrate
  profiles: ["tools"]
  depends_on:
    db-ops:
      condition: service_healthy
  environment:
    GOOSE_DRIVER: postgres
    GOOSE_DBSTRING: postgres://ec:ec_pass@db-ops:5432/ec_ops?sslmode=disable
  networks: [internal]

services:
  db-ops:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ec
      POSTGRES_PASSWORD: ec_pass
      POSTGRES_DB: ec_ops
    ports:
      - "5433:5432"
    volumes:
      - pg_ops_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ec -d ec_ops"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  # 運用系 (db-ops) 向け migration ([[ADR 0013]])。x-migrate-ops の共通定義に command だけ上書き。
  migrate-product:
    <<: *migrate-ops
    command: ["-table", "goose_product_version", "-dir", "/migrations/product", "up"]

  migrate-shipping:
    <<: *migrate-ops
    command: ["-table", "goose_shipping_version", "-dir", "/migrations/shipping", "up"]

  backoffice:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        APP: backoffice
    environment:
      PORT: "5175"
      HOST: "0.0.0.0"
      NODE_ENV: production
      PRODUCT_API_URL: http://product:8080
      ORDER_API_URL: http://order:8080
      SHIPPING_API_URL: http://shipping:8080
    ports: ["5175:5175"]
    depends_on: [product, order, shipping]
    networks: [internal]
