server {
    listen 80;
    server_name _;

    # SSR ローダから複数 API を並列に叩くため、上流のスローダウンで全体が詰まらないよう
    # connect は短めに、read/send は SSR 全体予算 (≒30s) に揃える。
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;

    # trailing slash で /<svc> プレフィックスを strip してから backend に渡す。
    location /product/ {
        proxy_pass http://product:80/;
    }
    location /order/ {
        proxy_pass http://order:80/;
    }
    location /payment/ {
        proxy_pass http://payment:80/;
    }
    location /member/ {
        proxy_pass http://member:80/;
    }
    location /shipping/ {
        proxy_pass http://shipping:80/;
    }

    location = /healthz {
        access_log off;
        return 200 'ok\n';
        add_header Content-Type text/plain;
    }
}
