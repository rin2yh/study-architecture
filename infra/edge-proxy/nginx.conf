# edge-proxy: 社外公開ゾーンと社内ゾーンを跨ぐ reverse proxy。
# 顧客 UI (external network) からの /<svc>/* を社内 backend (internal network) に転送する。
# location の trailing slash で /<svc> プレフィックスを strip してから backend に渡す。
server {
    listen 80;
    server_name _;

    # 接続単位のタイムアウトはおとなしめ (SSR ローダで連鎖呼び出しが詰まらないように)。
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;

    location /product/ {
        proxy_pass http://product:8080/;
    }
    location /order/ {
        proxy_pass http://order:8080/;
    }
    location /payment/ {
        proxy_pass http://payment:8080/;
    }
    location /member/ {
        proxy_pass http://member:8080/;
    }
    location /shipping/ {
        proxy_pass http://shipping:8080/;
    }

    # ヘルスチェック (Docker healthcheck から叩く想定)
    location = /healthz {
        access_log off;
        return 200 'ok\n';
        add_header Content-Type text/plain;
    }
}
