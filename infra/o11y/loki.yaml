# ローカル完結・単一バイナリ前提の最小構成 (README 方針)。永続化は filesystem、リングは inmemory。
auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # slog の trace_id / span_id を structured metadata として保持し、ラベル爆発を避けて相関に使う。
  allow_structured_metadata: true
